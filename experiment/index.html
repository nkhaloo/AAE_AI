<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your jsPsych Experiment</title>

  <link rel="stylesheet" href="jspsych/dist/jspsych.css">
  <script src="jspsych/dist/jspsych.js"></script>
  <script src="jspsych/dist/plugin-audio-button-response.js"></script>
</head>

<body></body>

<script>
  // initialize jsPsych clearly
  const jsPsych = initJsPsych();

  // define your timeline clearly
  const timeline = [{
    type: 'audio-button-response',
    stimulus: '../soundfiles/BM1_clean.wav',
    prompt: 'Click the button after listening.',
    choices: ['Continue']
  }];

  // run the timeline
  jsPsych.run(timeline);
</script>
</html>
