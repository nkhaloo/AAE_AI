<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Corrected jsPsych Experiment (v8)</title>

  <!-- jsPsych CSS -->
  <link rel="stylesheet" href="jspsych/dist/jspsych.css">

  <!-- jsPsych Core -->
  <script src="jspsych/dist/jspsych.js"></script>

  <!-- jsPsych Plugin -->
  <script src="jspsych/dist/plugin-audio-button-response.js"></script>
</head>

<body></body>

<script>
  // Do NOT call jsPsych as a function. Use the global jsPsych directly!
  const timeline = [
    {
      type: 'audio-button-response',
      stimulus: '../soundfiles/BM1_clean.wav',
      prompt: 'Click the button after listening.',
      choices: ['Continue']
    }
  ];

  // Directly run the timeline (no jsPsych() function call!)
  jsPsych.run(timeline);
</script>
</html>
