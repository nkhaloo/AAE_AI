<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My jsPsych Experiment</title>

  <!-- 1) Load jsPsych CSS -->
  <link rel="stylesheet" href="jspsych/dist/jspsych.css">

  <!-- 2) Load the main jsPsych library -->
  <script src="jspsych/dist/jspsych.js"></script>

  <!-- 3) Load the renamed plugin file -->
  <script src="jspsych/dist/jspsych-audio-button-response.js"></script>
</head>

<body></body>

<script>
  // 4) Initialize jsPsych (v7+)
  const jsPsych = initJsPsych();

  // 5) Define your timeline using the exact plugin type
  const timeline = [
    {
      type: 'audio-button-response',
      stimulus: '../soundfiles/BM1_clean.wav',
      prompt: 'Click the button after listening.',
      choices: ['Continue']
    }
  ];

  // 6) Run the experiment
  jsPsych.run(timeline);
</script>
</html>
