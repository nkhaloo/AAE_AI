<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple jsPsych Experiment</title>

  <!-- jsPsych CSS -->
  <link rel="stylesheet" href="jspsych/dist/jspsych.css">

  <!-- jsPsych Core -->
  <script src="jspsych/dist/jspsych.js"></script>

  <!-- jsPsych Plugin (traditional script import) -->
  <script src="jspsych/dist/plugin-audio-button-response.js"></script>
</head>

<body></body>

<script>
  // Initialize jsPsych (traditional style)
  const jsPsychInstance = jsPsych();

  // Simple trial setup (traditional string type)
  const timeline = [
    {
      type: 'audio-button-response',
      stimulus: '../soundfiles/BM1_clean.wav',
      prompt: 'Click the button after listening.',
      choices: ['Continue']
    }
  ];

  // Run the experiment
  jsPsychInstance.run(timeline);
</script>
</html>
