<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My jsPsych v8 Experiment</title>

  <script type="module">
    // Correct imports for jsPsych v8
    import jsPsych from './jspsych/dist/jspsych.js';
    import audioButtonResponse from './jspsych/dist/plugin-audio-button-response.js'; // restored name!

    // CSS Import
    import './jspsych/dist/jspsych.css';

    // Initialize jsPsych instance
    const jsPsychInstance = jsPsych();

    // Define your timeline
    const timeline = [
      {
        type: audioButtonResponse,
        stimulus: '../soundfiles/BM1_clean.wav',
        prompt: 'Click the button after listening.',
        choices: ['Continue']
      }
    ];

    // Run the experiment
    jsPsychInstance.run(timeline);
  </script>
</head>
<body></body>
</html>
