<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simplest Audio Experiment (Fully Correct)</title>
</head>

<body>
  <audio id="audioPlayer" src="soundfiles/BM1_clean.wav"></audio>
  <button id="playBtn">Play Audio</button>
  <button id="nextBtn" style="display:none;">Continue</button>

  <script>
    const audioPlayer = document.getElementById('audioPlayer');
    const playBtn = document.getElementById('playBtn');
    const nextBtn = document.getElementById('nextBtn');

    playBtn.addEventListener('click', () => {
      audioPlayer.play();
      playBtn.style.display = 'none';
    });

    audioPlayer.addEventListener('ended', () => {
      nextBtn.style.display = 'inline';
    });

    nextBtn.addEventListener('click', () => {
      alert("Audio completed. Moving to next step...");
    });
  </script>
</body>
</html>
