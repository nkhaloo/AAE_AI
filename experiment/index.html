<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>jsPsych v8 Audio Button Response</title>

    <link rel="stylesheet" href="jspsych/dist/jspsych.css" />

    <script src="jspsych/dist/jspsych.js"></script>
    
    <script src="jspsych/dist/plugin-audio-button-response.js"></script>
</head>
<body></body>

<script>
    // Initialize jsPsych v8
    const jsPsychInstance = initJsPsych();

    // Define the timeline for the experiment
    const timeline = [
        {
            type: 'audio-button-response',
            stimulus: '../soundfiles/BM1_clean.wav', // Path to your audio file
            prompt: 'Click the button after listening.',
            choices: ['Continue']
        }
    ];

    // Run the experiment
    jsPsychInstance.run(timeline);
</script>
</html>
